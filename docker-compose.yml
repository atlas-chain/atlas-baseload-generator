x-extra-hosts: &extra-hosts
  - "host.docker.internal:${HOST_GATEWAY_IP:-0.0.0.0}"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    restart: unless-stopped
    environment:
      SERVER_PORT: 3000
      SERVER_HOSTNAME: 0.0.0.0
      ATLAS_BASELOAD_RPC_NODE: ${ATLAS_BASELOAD_RPC_NODE:-}
      ATLAS_BASELOAD_MNEMONIC: ${ATLAS_BASELOAD_MNEMONIC:-}
      ATLAS_BASELOAD_ADMIN_BEARER_TOKEN: ${ATLAS_BASELOAD_ADMIN_BEARER_TOKEN:-}
      ATLAS_BASELOAD_INITIAL_CONFIG_PATH: ${ATLAS_BASELOAD_INITIAL_CONFIG_PATH:-}
      ATLAS_BASELOAD_PAYLOAD_PROVIDER_URL: ${ATLAS_BASELOAD_PAYLOAD_PROVIDER_URL:-}
      ATLAS_BASELOAD_PAYLOAD_PROVIDER_BEARER_KEY: ${ATLAS_BASELOAD_PAYLOAD_PROVIDER_BEARER_KEY:-}
      ATLAS_BASELOAD_PAYLOAD_PROVIDER_NAMESPACE: ${ATLAS_BASELOAD_PAYLOAD_PROVIDER_NAMESPACE:-arkiv.entities}
      ATLAS_BASELOAD_PAYLOAD_PROVIDER_VERIFY_RECEIPT: ${ATLAS_BASELOAD_PAYLOAD_PROVIDER_VERIFY_RECEIPT:-true}
      ATLAS_BASELOAD_CONFIG_DIR: /app/baseload-config
    ports:
      - "${BACKEND_HOST:-127.0.0.1}:${BACKEND_PORT:-3000}:3000"
    volumes:
      - ${ATLAS_BASELOAD_CONFIG_DIR:-./baseload-config}:/app/baseload-config
    extra_hosts: *extra-hosts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_TOKEN_SYMBOL: ${VITE_TOKEN_SYMBOL:-ETH}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 23560
      BACKEND_HOST: backend
      BACKEND_PORT: 3000
      VITE_TOKEN_SYMBOL: ${VITE_TOKEN_SYMBOL:-ETH}
    ports:
      - "${FRONTEND_HOST:-127.0.0.1}:${FRONTEND_PORT:-23560}:23560"
