name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: |
          if find src -type f \( -name '*.test.ts' -o -name '*.spec.ts' -o -name '*_test_*.ts' -o -name '*_spec_*.ts' \) | grep -q .; then
            bun test src
          else
            echo "No backend tests found; skipping."
          fi

  frontend:
    name: Frontend typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Run tests
        run: |
          if find src -type f \( -name '*.test.ts' -o -name '*.test.tsx' -o -name '*.spec.ts' -o -name '*.spec.tsx' -o -name '*_test_*' -o -name '*_spec_*' \) | grep -q .; then
            npm test
          else
            echo "No frontend tests found; skipping."
          fi
